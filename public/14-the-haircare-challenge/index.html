<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HairQare — 14-Day Challenge · Sales Page</title>
  <link rel="stylesheet" href="assets/colors_and_type.css">
  <link rel="stylesheet" href="assets/kit.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap">
  <style>
    /* ===========================================================
       Brief-specific tokens layered on top of the Rooted/SP foundations
       =========================================================== */
    :root {
      --green-bg:    #EAF3DE;
      --green-line:  #3B6D11;
      --green-text:  #2F570D;
      --danger-bg:   #FCEBEB;
      --danger-text: #A32D2D;
      --paper:       #FFF1A8;
    }
    .btn-primary { background: var(--orange-600); }
    .btn-primary:hover { background: var(--orange-700); }
    body { background: var(--white); }
    .wrap { max-width: 880px; }

    /* ===========================================================
       Wireframe annotation
       =========================================================== */
    .anno {
      display: none !important;
    }
    section { position: relative; }

    /* body bottom padding for sticky CTA (mobile) */
    body { padding-bottom: 0; }
    body.has-sticky-cta { padding-bottom: 78px; }

    /* ===========================================================
       Age stripe + urgency pill
       =========================================================== */
    .age-stripe {
      background: var(--ink); color: #fff; text-align: center;
      padding: 13px 24px; font-size: 14.5px; line-height: 1.45;
      font-family: var(--font-sans);
    }

    /* hero text hierarchy */
    .hero-h1 { margin: 0; }
    .hero-sub-hl {
      font-family: var(--font-serif); font-weight: 600;
      font-size: 21px; line-height: 1.35; color: var(--ink);
      margin: 0 0 14px; max-width: 440px;
    }
    .hero-validation {
      font-size: 16px; color: var(--ink-soft); line-height: 1.55;
      margin: 0 0 20px; max-width: 460px;
    }
    .hero-cohort {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 13px; color: var(--slate); font-weight: 600;
    }
    .urgency-pill {
      display: inline-flex; align-items: center; gap: 9px;
      background: var(--orange-50); border: 1px solid var(--orange-100);
      color: var(--orange-700); border-radius: 999px;
      padding: 9px 18px; font-size: 14px; font-weight: 600;
      max-width: 100%; line-height: 1.35;
    }

    /* ===========================================================
       Hero
       =========================================================== */
    .hero-image-wrap {
      position: relative; border-radius: 24px; overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .hero-image {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: center top;
    }
    .hero-image-caption {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 26px 18px 16px;
      background: linear-gradient(to top, rgba(26,26,26,.85), rgba(26,26,26,0));
    }
    /* ===========================================================
       Video testimonials section
       =========================================================== */
    .video-testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .video-card {
      background: #fff; border-radius: 20px;
      overflow: hidden; box-shadow: var(--shadow-md);
      display: flex; flex-direction: column;
      transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .video-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .video-thumb {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .video-thumb .ph { height: 100% !important; border-radius: 0 !important; }
    .video-play-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .video-play-circle {
      width: 54px; height: 54px; border-radius: 999px;
      background: rgba(255,255,255,.92);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px rgba(60,40,20,.2);
      transition: transform var(--dur) var(--ease);
    }
    .video-card:hover .video-play-circle { transform: scale(1.1); }
    .video-duration {
      position: absolute; bottom: 9px; right: 10px;
      background: rgba(26,26,26,.72); color: #fff;
      font-size: 11px; font-weight: 700; letter-spacing: .04em;
      border-radius: 999px; padding: 3px 9px;
    }
    .video-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .video-meta { display: flex; gap: 10px; align-items: center; }
    .video-avatar {
      width: 38px; height: 38px; border-radius: 999px;
      background: var(--orange-100); color: var(--orange-700);
      font-weight: 700; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex: none;
    }
    .video-name { font-weight: 700; font-size: 14.5px; line-height: 1.2; }
    .video-context { font-size: 12px; color: var(--slate); margin-top: 1px; }
    .video-quote { font-style: italic; font-size: 14.5px; line-height: 1.55; color: var(--ink-soft); margin: 0; }
    .video-hand-accent { display: flex; }

    @media (max-width: 720px) {
      .video-testi-grid { display: none; }
      .video-hand-accent { display: none !important; }
      .video-card { border-radius: 18px; }
      .video-play-circle { width: 48px; height: 48px; }
    }

    /* ===========================================================
       Vertical 9:16 video testimonial (Recognition → Science bridge)
       =========================================================== */
    .vert-video-card {
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      max-width: 320px;
      width: 100%;
      margin: 0 auto;
      transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .vert-video-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .vert-video-thumb {
      position: relative;
      aspect-ratio: 9/16;
      max-height: 560px;
      overflow: hidden;
    }
    .vert-video-thumb .ph { height: 100% !important; width: 100% !important; border-radius: 0 !important; }
    .vert-video-play-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .vert-video-play-circle {
      width: 56px; height: 56px; border-radius: 999px;
      background: rgba(255,255,255,.94);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 24px rgba(60,40,20,.22);
      transition: transform var(--dur) var(--ease);
      color: var(--orange-700);
    }
    .vert-video-card:hover .vert-video-play-circle { transform: scale(1.1); }
    .vert-video-duration {
      position: absolute; bottom: 10px; right: 12px;
      background: rgba(26,26,26,.75); color: #fff;
      font-size: 11px; font-weight: 700; letter-spacing: .04em;
      border-radius: 999px; padding: 3px 10px;
    }
    .vert-video-body {
      padding: 18px 20px 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .vert-video-meta {
      display: flex; gap: 12px; align-items: center;
    }
    .vert-video-avatar {
      width: 42px; height: 42px; border-radius: 999px;
      background: var(--orange-100); color: var(--orange-700);
      font-weight: 700; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex: none;
    }
    .vert-video-name { font-weight: 700; font-size: 15px; line-height: 1.2; }
    .vert-video-context { font-size: 12.5px; color: var(--slate); margin-top: 1px; }
    .vert-video-quote {
      font-style: italic; font-size: 15px; line-height: 1.55;
      color: var(--ink-soft); margin: 0;
    }
    @media (max-width: 720px) {
      .vert-video-card { max-width: 260px; border-radius: 20px; }
      .vert-video-thumb { max-height: 460px; }
      .vert-video-play-circle { width: 50px; height: 50px; }
      .vert-video-body { padding: 14px 16px 16px; }
      .vert-video-quote { font-size: 14px; }
    }

    .bg-video-section {
      background: radial-gradient(ellipse at 50% 45%, #FAF7F4 0%, #F0F0F6 55%);
    }

    /* ===========================================================
       What's included — premium bundle grid + pricing reveal
       =========================================================== */
    .bundle-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    }
    .bundle-item {
      background: #fff; border-radius: 16px;
      padding: 18px 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--line);
      display: grid; grid-template-columns: 72px 1fr; gap: 14px;
      position: relative;
      transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .bundle-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .bundle-item.flagship { border: 1.5px solid var(--orange-500); background: linear-gradient(135deg, var(--orange-50) 0%, #fff 65%); }
    .bundle-item.bonus { border: 1.5px dashed var(--orange-500); background: linear-gradient(135deg, #FFF6D1 0%, #fff 65%); }
    .bundle-item.included { background: var(--green-bg); border-color: var(--green-line); }
    .bundle-item-num {
      position: absolute; top: 12px; right: 16px;
      font-family: var(--font-serif); font-weight: 700; font-size: 13px;
      color: var(--slate-soft); letter-spacing: .04em;
    }
    .bundle-item-thumb {
      width: 72px; height: 72px; border-radius: 14px;
      background: repeating-linear-gradient(45deg, #EFE6DB, #EFE6DB 10px, #E8DDD0 10px, #E8DDD0 20px);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; line-height: 1;
      box-shadow: inset 0 0 0 1px rgba(60,40,20,.04);
    }
    .bundle-item.included .bundle-item-thumb { background: #fff; }
    .bundle-item-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; padding-right: 28px; }
    .bundle-item-title { font-weight: 700; font-size: 15.5px; line-height: 1.3; color: var(--ink); }
    .bundle-item-desc { font-size: 13.5px; line-height: 1.45; color: var(--slate); }
    .bundle-item-tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; align-items: center; }
    .bundle-item-tag {
      display: inline-block;
      font-size: 11.5px; font-weight: 700; letter-spacing: .02em;
      color: var(--orange-700); background: var(--orange-50);
      border: 1px solid var(--orange-100);
      border-radius: 999px; padding: 3px 9px;
    }
    .bundle-item-tag.incl { color: var(--green-text); background: #fff; border-color: var(--green-line); }
    .bundle-item-flag {
      display: inline-block;
      font-size: 11px; font-weight: 700; letter-spacing: .03em;
      border-radius: 999px; padding: 3px 9px; line-height: 1.2;
    }
    .bonus-flag { background: #FFF1A8; color: #7A5A00; }
    .flagship-flag { background: var(--orange-100); color: var(--orange-700); }

    /* pricing reveal */
    .pricing-card {
      background: #fff; border-radius: 24px;
      box-shadow: var(--shadow-lg);
      border: 2px solid var(--orange-500);
      overflow: hidden;
      max-width: 580px; margin: 0 auto;
    }
    .pricing-header {
      background: var(--orange-600); color: #fff;
      padding: 12px; text-align: center;
      font-size: 13px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .pricing-body { padding: 32px 32px 28px; }
    .pricing-total-row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px; padding-bottom: 16px; border-bottom: 1px dashed var(--line);
    }
    .pricing-label {
      font-size: 13px; color: var(--slate); font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
    }
    .pricing-strikethrough {
      font-family: var(--font-serif); font-weight: 700;
      font-size: 30px; color: var(--slate-soft);
      text-decoration: line-through; text-decoration-thickness: 2px;
    }
    .pricing-arrow-wrap { display: flex; justify-content: center; align-items: center; margin: 16px 0 10px; }
    .pricing-today-block { text-align: center; }
    .pricing-today-label {
      font-size: 13px; color: var(--orange-700); font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase; margin-bottom: 4px;
    }
    .pricing-today-amount {
      font-family: var(--font-serif); font-weight: 700;
      font-size: 84px; line-height: 1; color: var(--orange-600);
    }
    .pricing-save {
      display: inline-block;
      background: var(--green-bg); color: var(--green-text);
      border-radius: 999px; padding: 7px 16px;
      font-size: 13px; font-weight: 700; margin-top: 14px;
    }
    .pricing-trust {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: 18px; flex-wrap: wrap;
      font-size: 13px; color: var(--slate);
    }
    .pricing-trust > span { display: inline-flex; align-items: center; gap: 5px; }
    .pricing-trust-dot { color: var(--slate-soft); }

    /* Inline testimonial (trust-builder scattered through page) */
    .inline-testi {
      background: #fff; border-radius: 16px;
      padding: 16px 18px; box-shadow: var(--shadow-sm);
      display: flex; gap: 14px; align-items: flex-start;
      max-width: 580px;
    }
    .inline-testi.wide { max-width: 720px; }
    .inline-testi-avatar {
      flex: none; width: 52px; height: 52px;
      border-radius: 999px; padding: 0 !important;
    }
    .inline-testi-body { flex: 1; min-width: 0; }
    .inline-testi-quote {
      margin: 6px 0 8px;
      font-size: 15px; line-height: 1.5;
      color: var(--ink); font-style: italic;
    }
    .inline-testi-meta { font-size: 12.5px; color: var(--slate); font-weight: 600; }
    .hero-bullets {
      list-style: none; margin: 0 0 22px; padding: 0;
      display: flex; flex-direction: column; gap: 10px;
      max-width: 480px;
    }
    .hero-bullets li {
      display: flex; gap: 12px; align-items: flex-start;
      font-size: 16px; color: var(--ink); line-height: 1.45;
    }
    .hero-bullet-emoji {
      flex: none; width: 30px; height: 30px; border-radius: 999px;
      background: var(--orange-100);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; line-height: 1;
    }

    /* trust bar */
    .trust-bar { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
    .trust-stat { min-width: 130px; }
    .trustpilot-wrap { display: inline-flex; align-items: center; }

    /* ---- Community trust block (3 stacked rows) ---- */
    .community-trust {
      padding: 32px 24px 36px;
      display: flex; flex-direction: column;
      align-items: center; gap: 22px;
      text-align: center;
    }
    .ct-row { display: flex; align-items: center; justify-content: center; }
    .ct-community { flex-direction: column; gap: 14px; }
    .ct-avatars { display: inline-flex; }
    .ct-avatar {
      width: 38px; height: 38px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-sans); font-weight: 700; font-size: 14px;
      border: 2.5px solid #fff; box-shadow: var(--shadow-sm);
      margin-left: -10px;
    }
    .ct-avatar:first-child { margin-left: 0; }
    .ct-avatar-more {
      background: var(--orange-500); color: #fff;
      font-size: 16px; font-weight: 700;
    }
    .ct-community-text { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .ct-num {
      font-family: var(--font-serif); font-weight: 700;
      font-size: 38px; line-height: 1; color: var(--orange-600);
      letter-spacing: -0.01em;
    }
    .ct-num-sm { font-size: 34px; }
    .ct-label {
      font-size: 14px; line-height: 1.4; color: var(--slate);
      max-width: 200px;
    }
    .ct-stats { gap: 28px; width: 100%; max-width: 420px; }
    .ct-stat { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .ct-vrule { width: 1px; align-self: stretch; background: var(--line); }
    .ct-trustpilot {
      padding-top: 8px; border-top: 1px solid var(--line);
      width: 100%; max-width: 320px;
      flex-direction: column; gap: 6px;
    }

    /* ===========================================================
       Recognition cards
       =========================================================== */
    .reco-card {
      background: #fff; border-radius: 16px;
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
      border-left: 4px solid var(--orange-600);
      font-size: 16.5px; line-height: 1.5; color: var(--ink);
      height: 100%;
      display: flex; flex-direction: column; gap: 10px;
    }
    .reco-card p { margin: 0; }
    .reco-emoji { font-size: 22px; line-height: 1; }

    /* ===========================================================
       Recognition — stacked skim list
       =========================================================== */
    .reco-header-block {
      background: var(--cream);
      border-radius: 18px;
      padding: 22px 28px;
      max-width: 620px;
      margin: 0 auto;
      text-align: center;
    }
    .reco-eyebrow {
      font-size: 12px; font-weight: 700; letter-spacing: 1.6px;
      color: var(--orange-700); margin-bottom: 10px;
    }
    .reco-headline { margin: 0; font-size: 26px; line-height: 1.25; }
    .reco-stack {
      list-style: none; padding: 0; margin: 0 auto;
      max-width: 760px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .reco-row {
      position: relative;
      background: #fff;
      border: 1px solid var(--line);
      border-left: 4px solid var(--orange-600);
      border-radius: 14px;
      padding: 18px 22px;
      box-shadow: var(--shadow-sm);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .reco-row:hover { transform: translateY(-1px); box-shadow: 0 8px 22px -14px rgba(0,0,0,.18); }
    .reco-line {
      margin: 0;
      font-size: 16.5px; line-height: 1.55;
      color: var(--ink);
    }
    .reco-emoji-inline {
      font-size: 18px; margin-right: 8px;
    }
    .reco-trigger {
      font-family: var(--font-serif);
      font-weight: 700;
      color: var(--ink);
      font-size: 17.5px;
    }
    .reco-mid { color: var(--slate); }
    .reco-tail {
      color: var(--orange-700);
      font-style: italic;
      font-weight: 500;
    }
    .reco-note-wrap {
      margin-top: 8px;
      display: flex; justify-content: flex-end;
      padding-right: 6px;
    }
    @media (max-width: 720px) {
      .reco-header-block { padding: 18px 18px; }
      .reco-headline { font-size: 22px; }
      .reco-row { padding: 16px 16px; }
      .reco-line { font-size: 15.5px; }
      .reco-trigger { font-size: 16.5px; }
      .reco-note-wrap { justify-content: flex-start; padding-right: 0; }
    }

    /* ===========================================================
       Recognition — DIRECTION A: Diary Scroll
       =========================================================== */
    .diary-wrap {
      max-width: 560px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 22px;
      padding: 8px 4px 12px;
    }
    .diary-card {
      position: relative;
      background: #FBF6EC;
      padding: 22px 22px 18px;
      border-radius: 3px;
      box-shadow: 0 14px 28px -18px rgba(60,40,20,.35), 0 2px 4px rgba(60,40,20,.08);
      background-image: repeating-linear-gradient(
        to bottom, transparent 0, transparent 28px,
        rgba(168,140,90,.18) 28px, rgba(168,140,90,.18) 29px
      );
    }
    .diary-card::before {
      content: ""; position: absolute; left: 0; right: 0; top: -6px; height: 10px;
      background:
        radial-gradient(circle at 4px 10px, #FBF6EC 5px, transparent 6px) repeat-x;
      background-size: 12px 10px;
    }
    .diary-card.peach { background-color: #FBE8D6; background-blend-mode: multiply; }
    .diary-card.peach::before { background: radial-gradient(circle at 4px 10px, #FBE8D6 5px, transparent 6px) repeat-x; background-size: 12px 10px; }
    .diary-emoji { font-size: 30px; line-height: 1; margin-bottom: 6px; display: block; }
    .diary-trigger {
      font-family: var(--font-serif);
      font-size: 21px; line-height: 1.3; font-weight: 600;
      color: var(--ink); margin: 0 0 12px;
    }
    .diary-rule {
      border: none; border-top: 1px dashed rgba(60,40,20,.22);
      margin: 10px 0 12px;
    }
    .diary-hand {
      font-family: "Caveat", cursive;
      font-size: 21px; line-height: 1.35;
      color: #3a2e1f;
      margin: 0;
    }
    .diary-page {
      margin-top: 12px;
      font-family: "Caveat", cursive;
      font-size: 16px; color: rgba(60,40,20,.55);
      text-align: right;
    }
    .diary-margin-note {
      position: absolute; right: 10px; top: 14px;
    }
    @media (max-width: 720px) {
      .diary-trigger { font-size: 19px; }
      .diary-hand { font-size: 19px; }
      .diary-card { padding: 20px 18px 16px; }
    }

    /* ===========================================================
       Recognition — DIRECTION B: Spiral Timeline
       =========================================================== */
    .timeline-wrap {
      max-width: 680px; margin: 0 auto;
      position: relative;
      padding: 8px 0 0 64px;
    }
    .timeline-wrap::before {
      content: ""; position: absolute;
      left: 46px; top: 8px; bottom: 24px; width: 0;
      border-left: 2px dotted #D9C9B3;
    }
    .timeline-beat {
      position: relative;
      padding: 14px 0 28px;
    }
    .timeline-beat.heavy { padding-bottom: 36px; }
    .timeline-beat.final { padding-top: 40px; padding-bottom: 32px; }
    .timeline-year {
      position: absolute; left: -64px; top: 10px;
      width: 56px; text-align: right;
      font-family: var(--font-serif);
      font-size: 30px; line-height: 1;
      color: var(--ink-soft); font-weight: 500;
      letter-spacing: -.5px;
    }
    .timeline-dot {
      position: absolute; left: -19px; top: 18px;
      width: 10px; height: 10px; border-radius: 999px;
      background: var(--orange-600);
      box-shadow: 0 0 0 4px #fff;
    }
    .timeline-beat.final .timeline-dot {
